# App
spring.application.name=auth-service
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=smartcommerce
spring.datasource.password=smartcommerce123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak
keycloak.server-url=http://localhost:8080
keycloak.realm=smartcommerce
keycloak.client-id=smartcommerce-backend
keycloak.client-secret=backend-secret-key-change-in-prod

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis123

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
