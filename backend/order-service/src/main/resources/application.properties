server.port=8083
spring.application.name=order-service

spring.datasource.url=jdbc:postgresql://localhost:5433/order_db
spring.datasource.username=smartcommerce
spring.datasource.password=smartcommerce123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/smartcommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/smartcommerce/protocol/openid-connect/certs

management.endpoints.web.exposure.include=health,info


# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html